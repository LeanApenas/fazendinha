<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Beatriz & Milena</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2f75b5;
            --success: #28a745;
            --danger: #dc3545;
            --accent: #6f42c1;
            --pix: #17a2b8;
            --pdf-color: #17a2b8;
            --bg: #f4f7f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 10px;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .header-actions {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .button-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .button-group button {
            flex: 1;
            padding: 12px 5px;
            font-size: 0.85em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 12px 5px;
            border-radius: 8px;
            text-align: center;
            border-top: 4px solid var(--primary);
        }

        .card h3 {
            font-size: 0.9em;
            margin: 0;
            color: #666;
        }

        .card p {
            margin: 5px 0 0;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--primary);
        }

        .history-section {
            background: white;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 350px;
        }

        td,
        th {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.8em;
            text-align: left;
        }

        .input-section {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #ddd;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        label {
            font-size: 0.8em;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn-add {
            background: var(--success);
            color: white;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .header-actions {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .button-group {
                width: auto;
            }

            .dashboard-cards {
                grid-template-columns: repeat(5, 1fr);
            }

            .input-section {
                flex-direction: row;
                align-items: flex-end;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-actions">
            <div style="text-align:center">
                <label>Mês:</label>
                <input type="month" id="filtroMes" onchange="atualizarInterface()">
            </div>
            <div class="button-group">
                <button style="background:var(--pdf-color);color:white" onclick="gerarPDF()">📄 PDF</button>
                <button style="background:var(--accent);color:white" onclick="gerarImagem()">📸 FOTO</button>
            </div>
        </div>

        <div id="area-foto" style="padding: 10px; background-color: var(--bg);">
            <h2 style="text-align: center; color: var(--primary); font-size: 1.1em; margin-top: 0;">Relatório Beatriz &
                Milena</h2>

            <div class="dashboard-cards">
                <div class="card">
                    <h3>Total</h3>
                    <p id="totalGeral">R$ 0,00</p>
                </div>
                <div class="card" style="border-top-color: var(--success);">
                    <h3>Dinheiro</h3>
                    <p id="totalDinheiro">R$ 0,00</p>
                </div>
                <div class="card" style="border-top-color: var(--pix);">
                    <h3>PIX</h3>
                    <p id="totalPix">R$ 0,00</p>
                </div>
                <div class="card">
                    <h3>Crédito</h3>
                    <p id="totalCredito">R$ 0,00</p>
                </div>
                <div class="card">
                    <h3>Débito</h3>
                    <p id="totalDebito">R$ 0,00</p>
                </div>
            </div>

            <div class="history-section">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Prod.</th>
                            <th>Vend.</th>
                            <th>Pgto.</th>
                            <th>Valor</th>
                            <th class="no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="listaVendas"></tbody>
                </table>
            </div>
        </div>

        <div class="input-section">
            <div class="input-row">
                <div class="input-group"><label>Produto</label><input type="text" id="produto"
                        placeholder="Ex: Vestido"></div>
                <div class="input-group" style="flex:0.4"><label>Valor</label><input type="number" id="valor"
                        step="0.01" placeholder="0,00"></div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Vendedor</label>
                    <select id="vendedor">
                        <option>Beatriz</option>
                        <option>Milena</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Pagamento</label>
                    <select id="pagamento">
                        <option>Dinheiro</option>
                        <option>PIX</option>
                        <option>Crédito</option>
                        <option>Débito</option>
                    </select>
                </div>
            </div>
            <button class="btn-add" id="btnSalvar" onclick="adicionarVenda()">Registrar Venda</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO SUPABASE ---
        const SUPABASE_URL = 'https://wqlegyymfygzfvclglng.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RuAKM7NKPwoFWFK-CsvQwQ_wzpmjapZ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const inputFiltro = document.getElementById('filtroMes');
        inputFiltro.value = new Date().toISOString().substring(0, 7);

        async function adicionarVenda() {
            const prod = document.getElementById('produto').value;
            const val = parseFloat(document.getElementById('valor').value);
            if (!prod || isNaN(val)) return alert("Preencha o produto e o valor!");

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            const agora = new Date();
            const dataFormatada = agora.toLocaleDateString('pt-BR').substring(0, 5) + ' ' +
                agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const { error } = await _supabase.from('vendas').insert([{
                periodo: agora.toISOString().substring(0, 7),
                data_hora: dataFormatada,
                produto: prod,
                valor: val,
                vendedor: document.getElementById('vendedor').value,
                pagamento: document.getElementById('pagamento').value
            }]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                document.getElementById('produto').value = '';
                document.getElementById('valor').value = '';
                await atualizarInterface();
            }
            btn.disabled = false;
            btn.innerText = "Registrar Venda";
        }

        async function atualizarInterface() {
            const { data: vendas, error } = await _supabase.from('vendas')
                .select('*')
                .eq('periodo', inputFiltro.value)
                .order('id', { ascending: false });

            if (error) return console.error(error);

            const lista = document.getElementById('listaVendas');
            lista.innerHTML = '';
            let totais = { Geral: 0, Dinheiro: 0, PIX: 0, Crédito: 0, Débito: 0 };

            vendas.forEach(v => {
                lista.innerHTML += `<tr>
                    <td>${v.data_hora}</td>
                    <td>${v.produto}</td>
                    <td>${v.vendedor}</td>
                    <td>${v.pagamento}</td>
                    <td><strong>R$ ${v.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</strong></td>
                    <td class="no-print" onclick="excluirVenda(${v.id})" style="color:var(--danger);cursor:pointer;text-align:center">🗑️</td>
                </tr>`;

                totais.Geral += v.valor;

                // Normalização para evitar problemas com acentos (Crédito vs Credito)
                let p = v.pagamento;
                if (totais[p] !== undefined) {
                    totais[p] += v.valor;
                }
            });

            document.getElementById('totalGeral').innerText = "R$ " + totais.Geral.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalDinheiro').innerText = "R$ " + totais.Dinheiro.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalPix').innerText = "R$ " + totais.PIX.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalCredito').innerText = "R$ " + totais.Crédito.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalDebito').innerText = "R$ " + totais.Débito.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        async function excluirVenda(id) {
            if (confirm("Deseja realmente excluir esta venda?")) {
                await _supabase.from('vendas').delete().eq('id', id);
                atualizarInterface();
            }
        }

        async function gerarImagem() {
            const area = document.getElementById('area-foto');
            const noPrint = document.querySelectorAll('.no-print');
            noPrint.forEach(el => el.style.display = 'none');

            try {
                const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: "#f4f7f9" });
                const link = document.createElement('a');
                link.download = `relatorio-${inputFiltro.value}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (err) {
                alert("Erro ao gerar imagem: " + err);
            } finally {
                noPrint.forEach(el => el.style.display = '');
            }
        }

        function gerarPDF() {
            const area = document.getElementById('area-foto');
            const noPrint = document.querySelectorAll('.no-print');
            noPrint.forEach(el => el.style.display = 'none');

            const opt = {
                margin: 5,
                filename: `relatorio-${inputFiltro.value}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(area).save().then(() => {
                noPrint.forEach(el => el.style.display = '');
            }).catch(err => {
                alert("Erro ao gerar PDF: " + err);
                noPrint.forEach(el => el.style.display = '');
            });
        }

        atualizarInterface();
        setInterval(atualizarInterface, 30000); 
    </script>
</body>

</html>
