<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Beatriz & Milena</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2f75b5;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .filtro-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #area-relatorio {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }

        /* Layout de 4 Cartões + PIX na lateral */
        .dashboard-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            flex: 1;
        }

        .card {
            background: white;
            padding: 15px 5px;
            border-radius: 8px;
            text-align: center;
            border: 1.5px solid var(--primary);
        }

        .card h3 {
            font-size: 0.85em;
            margin: 0;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .card p {
            margin: 0;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--primary);
        }

        /* Caixa do PIX destacada */
        .pix-box {
            width: 140px;
            border: 2px solid #000;
            padding: 15px 5px;
            text-align: center;
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pix-box strong {
            font-size: 0.9em;
        }

        .pix-box span {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--primary);
            margin-top: 5px;
        }

        /* Tabela de Atalhos de Produtos */
        .atalhos-container {
            max-width: 1100px;
            margin: 20px auto;
            background: #e9ecef;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--primary);
        }

        .atalhos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .btn-atalho {
            padding: 10px;
            border: 1px solid var(--primary);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            text-align: center;
        }

        .btn-atalho:hover {
            background: #f0f7ff;
        }

        .btn-atalho b {
            display: block;
            color: #d9534f;
            margin-top: 3px;
        }

        /* Tabela de Vendas */
        .history-section {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px;
            font-size: 0.85em;
            color: #333;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.85em;
        }

        .btn-del {
            cursor: pointer;
            opacity: 0.5;
        }

        /* Área de Cadastro */
        .input-area {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .btn-salvar {
            background: #28a745;
            color: white;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
        }

        .no-print {
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="header-top">
        <div class="filtro-container">
            <label>Mês:</label>
            <input type="month" id="filtroMes" onchange="atualizarInterface()">
        </div>
        <div class="no-print">
            <button onclick="window.print()" style="padding: 10px; cursor: pointer;">📄 Imprimir Relatório</button>
        </div>
    </div>

    <div id="area-relatorio">
        <h2>Relatório Beatriz & Milena</h2>

        <div class="dashboard-container">
            <div class="cards-grid">
                <div class="card">
                    <h3>Total</h3>
                    <p id="totalGeral">R$ 0,00</p>
                </div>
                <div class="card">
                    <h3>Dinheiro</h3>
                    <p id="totalDinheiro">R$ 0,00</p>
                </div>
                <div class="card">
                    <h3>Crédito</h3>
                    <p id="totalCredito">R$ 0,00</p>
                </div>
                <div class="card">
                    <h3>Débito</h3>
                    <p id="totalDebito">R$ 0,00</p>
                </div>
            </div>

            <div class="pix-box">
                <strong>PIX</strong>
                <span id="totalPix">R$ 0,00</span>
            </div>
        </div>

        <div class="history-section">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Prod.</th>
                        <th>Vend.</th>
                        <th>Pgto.</th>
                        <th>Valor</th>
                        <th class="no-print"></th>
                    </tr>
                </thead>
                <tbody id="listaVendas"></tbody>
            </table>
        </div>
    </div>

    <div class="atalhos-container">
        <p style="margin: 0 0 10px 0; font-weight: bold; color: var(--primary);">Produtos Rápidos (Clique para
            preencher):</p>
        <div class="atalhos-grid">
            <button class="btn-atalho" onclick="preencher('cenoura', 15.00)">cenoura <b>R$ 15,00</b></button>
            <button class="btn-atalho" onclick="preencher('cesta', 45.00)">cesta <b>R$ 45,00</b></button>
            <button class="btn-atalho" onclick="preencher('caixotinho', 30.00)">caixotinho <b>R$ 30,00</b></button>
            <button class="btn-atalho" onclick="preencher('alfafa', 15.00)">alfafa <b>R$ 15,00</b></button>
            <button class="btn-atalho" onclick="preencher('aluguel de carrinho', 35.00)">aluguel <b>R$
                    35,00</b></button>
            <button class="btn-atalho" onclick="preencher('Squany aogel', 33.00)">Squany aogel <b>R$ 33,00</b></button>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <div class="input-group"><label>Produto</label><input type="text" id="produto"
                    placeholder="Nome do produto"></div>
            <div class="input-group" style="flex:0.3"><label>Valor</label><input type="number" id="valor" step="0.01"
                    placeholder="0,00"></div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>Vendedor</label>
                <select id="vendedor">
                    <option>Beatriz</option>
                    <option>Milena</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pagamento</label>
                <select id="pagamento">
                    <option>Dinheiro</option>
                    <option>PIX</option>
                    <option>Crédito</option>
                    <option>Débito</option>
                </select>
            </div>
        </div>
        <button class="btn-salvar" id="btnSalvar" onclick="adicionarVenda()">Registrar Venda</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://wqlegyymfygzfvclglng.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RuAKM7NKPwoFWFK-CsvQwQ_wzpmjapZ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const inputFiltro = document.getElementById('filtroMes');
        inputFiltro.value = "2026-04"; // Define abril de 2026 como padrão inicial

        // Função para preencher automaticamente os campos
        function preencher(nome, preco) {
            document.getElementById('produto').value = nome;
            document.getElementById('valor').value = preco;
            document.getElementById('pagamento').focus();
        }

        async function adicionarVenda() {
            const prod = document.getElementById('produto').value;
            const val = parseFloat(document.getElementById('valor').value);
            if (!prod || isNaN(val)) return alert("Preencha o produto e o valor!");

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;

            const agora = new Date();
            const dataHora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const { error } = await _supabase.from('vendas').insert([{
                periodo: agora.toISOString().substring(0, 10), // Salva como 2026-04-25
                data_hora: dataHora,
                produto: prod,
                valor: val,
                vendedor: document.getElementById('vendedor').value,
                pagamento: document.getElementById('pagamento').value
            }]);

            if (error) alert("Erro: " + error.message);
            else {
                document.getElementById('produto').value = '';
                document.getElementById('valor').value = '';
                atualizarInterface();
            }
            btn.disabled = false;
        }

        async function atualizarInterface() {
            const mesSelecionado = inputFiltro.value; // Ex: "2026-04"

            // Busca todas as vendas que COMEÇAM com o mês selecionado
            const { data: vendas, error } = await _supabase.from('vendas')
                .select('*')
                .filter('periodo', 'ilike', `${mesSelecionado}%`)
                .order('id', { ascending: false });

            if (error) return;

            const lista = document.getElementById('listaVendas');
            lista.innerHTML = '';
            let totais = { Geral: 0, Dinheiro: 0, PIX: 0, Credito: 0, Debito: 0 };

            vendas.forEach(v => {
                const valorNumerico = parseFloat(v.valor);

                lista.innerHTML += `<tr>
                    <td>${v.data_hora}</td>
                    <td>${v.produto}</td>
                    <td>${v.vendedor}</td>
                    <td>${v.pagamento}</td>
                    <td><strong>R$ ${valorNumerico.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</strong></td>
                    <td class="no-print btn-del" onclick="excluir(${v.id})">🗑️</td>
                </tr>`;

                totais.Geral += valorNumerico;
                const p = v.pagamento.toLowerCase();
                if (p === "dinheiro") totais.Dinheiro += valorNumerico;
                else if (p === "pix") totais.PIX += valorNumerico;
                else if (p.includes("crédito") || p.includes("credito")) totais.Credito += valorNumerico;
                else if (p.includes("débito") || p.includes("debito")) totais.Debito += valorNumerico;
            });

            document.getElementById('totalGeral').innerText = "R$ " + totais.Geral.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalDinheiro').innerText = "R$ " + totais.Dinheiro.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalPix').innerText = "R$ " + totais.PIX.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalCredito').innerText = "R$ " + totais.Credito.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalDebito').innerText = "R$ " + totais.Debito.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        async function excluir(id) {
            if (confirm("Excluir esta venda?")) {
                await _supabase.from('vendas').delete().eq('id', id);
                atualizarInterface();
            }
        }

        atualizarInterface();
    </script>
</body>

</html>
