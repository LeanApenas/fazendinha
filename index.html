<style>
    /* ... (mantenha o restante do seu CSS) ... */

    /* SEÇÃO DE ENTRADA CORRIGIDA */
    .input-section {
        background: #fff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        /* No celular, um embaixo do outro */
        gap: 15px;
        border: 1px solid #ddd;
    }

    .input-row {
        display: flex;
        gap: 10px;
        width: 100%;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        /* Impede que o input force a largura para fora */
    }

    input,
    select {
        width: 100%;
        box-sizing: border-box;
        /* Garante que o padding não aumente o tamanho total */
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
    }

    /* AJUSTE PARA PC */
    @media (min-width: 768px) {
        .input-section {
            flex-direction: row;
            /* No PC, volta a ser lado a lado */
            align-items: flex-end;
        }

        .input-row {
            width: auto;
            flex: 2;
        }
    }
</style>

<div class="input-section">
    <div class="input-row">
        <div class="input-group">
            <label>Produto</label>
            <input type="text" id="produto" placeholder="Nome">
        </div>
        <div class="input-group" style="flex: 0.4;"> <label>Valor</label>
            <input type="number" id="valor" step="0.01" placeholder="0,00">
        </div>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>Vendedor</label>
            <select id="vendedor">
                <option value="Beatriz">Beatriz</option>
                <option value="Milena">Milena</option>
            </select>
        </div>
        <div class="input-group">
            <label>Pagamento</label>
            <select id="pagamento">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Crédito">Crédito</option>
                <option value="Débito">Débito</option>
            </select>
        </div>
    </div>

    <button class="btn-add" onclick="adicionarVenda()">Registrar Venda</button>
</div>
