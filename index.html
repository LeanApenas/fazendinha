<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Beatriz & Milena - Diário</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2f75b5;
            --bg: #f4f7f9;
            --accent: #7030a0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .filtro-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #area-relatorio {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .btn-export {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-pdf {
            background: #17a2b8;
        }

        .btn-foto {
            background: #6f42c1;
        }

        /* Dashboard */
        .dashboard-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 15px 5px;
            border-radius: 8px;
            text-align: center;
            border: 1.5px solid var(--primary);
            flex: 1;
            min-width: 120px;
        }

        .card h3 {
            font-size: 0.85em;
            margin: 0;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .card p {
            margin: 0;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--primary);
        }

        .pix-box {
            border: 2px solid #000;
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 120px;
        }

        .pix-box strong {
            font-size: 0.9em;
        }

        .pix-box span {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--primary);
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 12px;
            font-size: 0.9em;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .btn-del {
            cursor: pointer;
            opacity: 0.3;
        }

        .btn-del:hover {
            opacity: 1;
            color: red;
        }

        /* Cadastro e Atalhos */
        .atalhos-container {
            max-width: 1100px;
            margin: 20px auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--primary);
        }

        .atalhos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .btn-atalho {
            padding: 8px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .btn-atalho b {
            color: #d9534f;
        }

        .input-area {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .btn-salvar {
            background: #28a745;
            color: white;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            #area-relatorio {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>

<body>

    <div class="header-top no-print">
        <div class="filtro-container">
            <label>Filtrar por Dia:</label>
            <input type="date" id="filtroDia" onchange="atualizarInterface()">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-export btn-pdf" onclick="exportarPDF()">📄 PDF</button>
            <button class="btn-export btn-foto" onclick="exportarFoto()">📸 FOTO</button>
        </div>
    </div>

    <div id="area-relatorio">
        <h2 id="tituloRelatorio">Relatório de Vendas</h2>

        <div class="dashboard-container">
            <div class="card">
                <h3>Total Dia</h3>
                <p id="totalGeral">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Dinheiro</h3>
                <p id="totalDinheiro">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Crédito</h3>
                <p id="totalCredito">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Débito</h3>
                <p id="totalDebito">R$ 0,00</p>
            </div>
            <div class="pix-box">
                <strong>PIX</strong>
                <span id="totalPix">R$ 0,00</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Produto</th>
                    <th>Vendedor</th>
                    <th>Pagamento</th>
                    <th>Valor</th>
                    <th class="no-print"></th>
                </tr>
            </thead>
            <tbody id="listaVendas"></tbody>
        </table>
    </div>

    <div class="atalhos-container no-print">
        <div class="atalhos-grid">
            <button class="btn-atalho" onclick="preencher('cenoura', 15)">cenoura <b>R$ 15</b></button>
            <button class="btn-atalho" onclick="preencher('cesta', 45)">cesta <b>R$ 45</b></button>
            <button class="btn-atalho" onclick="preencher('caixotinho', 30)">caixotinho <b>R$ 30</b></button>
            <button class="btn-atalho" onclick="preencher('alfafa', 15)">alfafa <b>R$ 15</b></button>
            <button class="btn-atalho" onclick="preencher('aluguel', 35)">aluguel <b>R$ 35</b></button>
            <button class="btn-atalho" onclick="preencher('Squany aogel', 33)">Squany <b>R$ 33</b></button>
        </div>
    </div>

    <div class="input-area no-print">
        <div class="input-row">
            <div class="input-group"><label>Produto</label><input type="text" id="produto"></div>
            <div class="input-group" style="flex:0.3"><label>Valor</label><input type="number" id="valor" step="0.01">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>Vendedor</label>
                <select id="vendedor">
                    <option>Beatriz</option>
                    <option>Milena</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pagamento</label>
                <select id="pagamento">
                    <option>Dinheiro</option>
                    <option>PIX</option>
                    <option>Crédito</option>
                    <option>Débito</option>
                </select>
            </div>
        </div>
        <button class="btn-salvar" id="btnSalvar" onclick="adicionarVenda()">Registrar Venda</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://wqlegyymfygzfvclglng.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RuAKM7NKPwoFWFK-CsvQwQ_wzpmjapZ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Define a data de hoje como padrão no filtro
        const campoData = document.getElementById('filtroDia');
        const hoje = new Date().toISOString().split('T')[0];
        campoData.value = hoje;

        function preencher(n, v) { document.getElementById('produto').value = n; document.getElementById('valor').value = v; }

        async function adicionarVenda() {
            const prod = document.getElementById('produto').value;
            const val = parseFloat(document.getElementById('valor').value);
            if (!prod || isNaN(val)) return alert("Dados inválidos");

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;

            const agora = new Date();
            const { error } = await _supabase.from('vendas').insert([{
                periodo: campoData.value, // Salva na data que está selecionada no filtro
                data_hora: agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                produto: prod,
                valor: val,
                vendedor: document.getElementById('vendedor').value,
                pagamento: document.getElementById('pagamento').value
            }]);

            if (!error) {
                document.getElementById('produto').value = '';
                document.getElementById('valor').value = '';
                atualizarInterface();
            }
            btn.disabled = false;
        }

        async function atualizarInterface() {
            const dataSel = campoData.value;
            const dataBR = dataSel.split('-').reverse().join('/');
            document.getElementById('tituloRelatorio').innerText = `Relatório - Dia ${dataBR}`;

            const { data: vendas, error } = await _supabase.from('vendas')
                .select('*')
                .eq('periodo', dataSel)
                .order('id', { ascending: false });

            const lista = document.getElementById('listaVendas');
            lista.innerHTML = '';
            let t = { total: 0, din: 0, pix: 0, cre: 0, deb: 0 };

            if (vendas) {
                vendas.forEach(v => {
                    const val = parseFloat(v.valor);
                    t.total += val;
                    const p = v.pagamento.toLowerCase();
                    if (p === 'dinheiro') t.din += val;
                    else if (p === 'pix') t.pix += val;
                    else if (p.includes('cré')) t.cre += val;
                    else if (p.includes('déb')) t.deb += val;

                    lista.innerHTML += `<tr>
                        <td>${v.data_hora}</td>
                        <td>${v.produto}</td>
                        <td>${v.vendedor}</td>
                        <td>${v.pagamento}</td>
                        <td><b>R$ ${val.toFixed(2)}</b></td>
                        <td class="no-print btn-del" onclick="excluir(${v.id})">🗑️</td>
                    </tr>`;
                });
            }

            const f = (n) => "R$ " + n.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('totalGeral').innerText = f(t.total);
            document.getElementById('totalDinheiro').innerText = f(t.din);
            document.getElementById('totalPix').innerText = f(t.pix);
            document.getElementById('totalCredito').innerText = f(t.cre);
            document.getElementById('totalDebito').innerText = f(t.deb);
        }

        async function excluir(id) { if (confirm("Excluir?")) { await _supabase.from('vendas').delete().eq('id', id); atualizarInterface(); } }

        function exportarPDF() {
            const elemento = document.getElementById('area-relatorio');
            const opt = { margin: 10, filename: `Relatorio_${campoData.value}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(elemento).save();
        }

        function exportarFoto() {
            const elemento = document.getElementById('area-relatorio');
            html2canvas(elemento).then(canvas => {
                const link = document.createElement('a');
                link.download = `Relatorio_${campoData.value}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        atualizarInterface();
    </script>
</body>

</html>
